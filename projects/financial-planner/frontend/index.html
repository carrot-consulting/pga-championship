<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Planner</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="noise-overlay"></div>

  <header class="top-bar">
    <div class="brand">
      <span class="brand-icon">$</span>
      <h1>Financial Planner</h1>
    </div>
    <div class="controls">
      <div class="select-wrapper">
        <select id="account-filter" aria-label="Filter by account">
          <option value="">All accounts</option>
        </select>
        <svg class="select-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="select-wrapper">
        <select id="month-selector" aria-label="Select month">
          <option value="">All months</option>
        </select>
        <svg class="select-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <button id="refresh-btn" class="btn-refresh" aria-label="Scan for new statements">
        <svg class="refresh-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M13.65 2.35A8 8 0 1 0 16 8h-2a6 6 0 1 1-1.76-4.24L10 6h6V0l-2.35 2.35z" fill="currentColor"/>
        </svg>
        <span>Scan</span>
      </button>
    </div>
  </header>

  <main>
    <section class="summary-row" id="summary-cards">
      <div class="card summary-card" data-type="expenses">
        <span class="card-label">Total Spent</span>
        <span class="card-value" id="total-spent">--</span>
      </div>
      <div class="card summary-card" data-type="credits">
        <span class="card-label">Credits</span>
        <span class="card-value" id="total-credits">--</span>
      </div>
      <div class="card summary-card" data-type="net">
        <span class="card-label">Net</span>
        <span class="card-value" id="net-amount">--</span>
      </div>
      <div class="card summary-card" data-type="count">
        <span class="card-label">Transactions</span>
        <span class="card-value" id="txn-count">--</span>
      </div>
    </section>

    <section class="content-grid">
      <div class="card chart-card">
        <h2 class="card-title">Spend by Category</h2>
        <div class="chart-container">
          <canvas id="category-chart"></canvas>
        </div>
        <div id="chart-legend" class="chart-legend"></div>
      </div>

      <div class="card table-card">
        <div class="table-header">
          <h2 class="card-title">Transactions</h2>
          <div class="table-controls">
            <div class="select-wrapper">
              <select id="type-filter" aria-label="Filter by type">
                <option value="">All types</option>
                <option value="debit">Debits</option>
                <option value="credit">Credits</option>
              </select>
              <svg class="select-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="select-wrapper">
              <select id="category-filter" aria-label="Filter by category">
                <option value="">All categories</option>
              </select>
              <svg class="select-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="table-count" id="table-count"></span>
          </div>
        </div>
        <div class="table-scroll">
          <table id="txn-table">
            <thead>
              <tr>
                <th class="sortable" data-sort="date">Date<span class="sort-arrow"></span></th>
                <th class="sortable" data-sort="vendor">Vendor<span class="sort-arrow"></span></th>
                <th class="sortable" data-sort="category">Category<span class="sort-arrow"></span></th>
                <th class="sortable col-amount" data-sort="amount">Amount<span class="sort-arrow"></span></th>
              </tr>
            </thead>
            <tbody id="txn-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="/static/app.js"></script>
</body>
</html>
